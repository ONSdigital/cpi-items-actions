name: Update data

on:
  schedule:
  - cron: "01 07 14-27 * *" 
    timezone: "Europe/London"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4 # Checkout the repository

      - name: Set up R
        uses: r-lib/actions/setup-r@v2 # Install R
        
      - name: Install R pacakges
        run: |
          install.packages(c("openxlsx"))
        shell: Rscript {0}

      - name: Import data
        run: Rscript -e 'source("R/postprocess.R")' # Run R script

      - name: Commit and push results
        run: |
         git config --global user.name "github-actions[bot]"
         git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
         git add -A
         git commit -m 'GitHub Actions Results added' || echo "No changes to commit"
         git push origin || echo "No changes to commit"
